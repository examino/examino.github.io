下班前，看著病歷紀錄，我感觸良多。泌尿道感染雖是小病，卻是身體發出的免疫警訊。提醒大家：少喝含糖飲料、多喝清水、別熬夜。守護健康有時不需要昂貴的補品，只需在日常生活中給予身體最基本的尊重。

                            <svg class="w-8 h-8 text-blue-600 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                            </svg>
                            <h1 class="text-xl font-bold text-slate-800 tracking-wide">${t('醫師診療與反思日誌')}</h1>
                        </div>
                        
                        <!-- 語言切換按鈕 -->
                        <div class="flex bg-slate-100 p-1 rounded-lg border border-slate-200">
                            <button onclick="setLang('tc')" class="px-3 py-1 text-sm font-medium rounded-md transition-colors duration-200 ${currentLang === 'tc' ? 'bg-white shadow text-blue-600' : 'text-slate-500 hover:text-slate-700'}">
                                繁體
                            </button>
                            <button onclick="setLang('sc')" class="px-3 py-1 text-sm font-medium rounded-md transition-colors duration-200 ${currentLang === 'sc' ? 'bg-white shadow text-blue-600' : 'text-slate-500 hover:text-slate-700'}">
                                简体
                            </button>
                        </div>
                    </div>
                </div>
            </header>

            <!-- 網頁標語 Banner -->
            <div class="bg-gradient-to-r from-blue-700 to-teal-500 py-12">
                <div class="max-w-4xl mx-auto px-4 sm:px-6 text-center">
                    <h2 class="text-3xl font-extrabold text-white sm:text-4xl mb-4">
                        ${t('醫者仁心，筆記點滴')}
                    </h2>
                    <p class="text-lg text-blue-100 max-w-2xl mx-auto">
                        ${t('記錄每一位病患的就診總結，反思醫療流程中的細節與同理心。這是科學與人文的交匯。')}
                    </p>
                </div>
            </div>

            <main class="max-w-4xl mx-auto py-8 px-4 sm:px-6 lg:px-8 min-h-screen">
                
                <!-- 標籤頁切換區 -->
                <div class="flex justify-center mb-10 border-b border-slate-200">
                    <button onclick="setTab('summaries')" class="px-6 py-3 font-semibold text-base transition-colors duration-200 border-b-2 ${currentTab === 'summaries' ? 'border-blue-600 text-blue-600' : 'border-transparent text-slate-500 hover:text-slate-700 hover:border-slate-300'}">
                        ${t('每日就診總結紀錄')}
                    </button>
                    <button onclick="setTab('diaries')" class="px-6 py-3 font-semibold text-base transition-colors duration-200 border-b-2 ${currentTab === 'diaries' ? 'border-blue-600 text-blue-600' : 'border-transparent text-slate-500 hover:text-slate-700 hover:border-slate-300'}">
                        ${t('醫生個人工作與反思日記')}
                    </button>
                </div>

                <!-- 內容呈現區 -->
                <div class="content-area">
                    ${currentTab === 'summaries' ? renderSummaries() : renderDiaries()}
                </div>
                
            </main>

            <!-- 頁尾 -->
            <footer class="bg-slate-800 text-slate-400 py-8 text-center text-sm">
                <p>&copy; 2025-2026 ${t('醫生診療記錄檔案. All Rights Reserved.')}</p>
            </footer>
        `;
    }

    // 渲染【每日就診總結】的時間軸 UI
    function renderSummaries() {
        if(summaryList.length === 0) return `<p class="text-center text-slate-500">${t('暫無資料')}</p>`;
        
        const htmlLines = summaryList.map((item, index) => {
            return `
                <div class="relative pl-8 sm:pl-32 py-4 group">
                    <!-- 電腦版日期放置左側 -->
                    <div class="hidden sm:block absolute left-0 top-4 w-24 text-right font-bold text-sm text-teal-600">
                        ${item.date.replace('2025/', '25/').replace('2026/', '26/')}
                    </div>
                    
                    <!-- 時間軸節點 -->
                    <div class="absolute w-3 h-3 bg-white border-2 border-blue-500 rounded-full left-[11px] sm:left-[111px] top-5 group-hover:bg-blue-500 transition-colors"></div>
                    
                    <!-- 卡片內容 -->
                    <div class="bg-white rounded-lg shadow-sm border border-slate-100 p-4 sm:p-5 hover:shadow-md transition-shadow">
                        <!-- 手機版日期顯示在上方 -->
                        <h3 class="sm:hidden text-sm font-bold text-teal-600 mb-2">${item.date}</h3>
                        <p class="text-slate-700 leading-relaxed">${t(item.text)}</p>
                    </div>
                </div>
            `;
        }).join('');

        return `
            <div class="relative border-l-2 border-slate-200 ml-3 sm:ml-[117px]">
                ${htmlLines}
            </div>
        `;
    }

    // 渲染【反思日記】的卡片 UI
    function renderDiaries() {
        if(diaryList.length === 0) return `<p class="text-center text-slate-500">${t('暫無資料')}</p>`;

        const htmlCards = diaryList.map(item => {
            // 將內容依換行符號切割為段落
            const paragraphs = item.content.split('\n').filter(p => p.trim() !== '');
            const pTags = paragraphs.map(p => `<p class="mb-4 text-slate-700 leading-relaxed text-justify">${t(p.trim())}</p>`).join('');

            // 動態為標題加上天氣 Emoji
            let headerWithEmoji = item.header;
            if (headerWithEmoji.includes('暴雨')) {
                headerWithEmoji += ' ⛈️';
            } else if (headerWithEmoji.includes('雨')) {
                headerWithEmoji += ' 🌧️';
            } else if (headerWithEmoji.includes('晴') || headerWithEmoji.includes('睛')) {
                // 相容原文中將「晴」誤打成「睛」的狀況
                headerWithEmoji += ' ☀️';
            } else if (headerWithEmoji.includes('多雲')) {
                headerWithEmoji += ' ⛅';
            } else if (headerWithEmoji.includes('陰')) {
                headerWithEmoji += ' ☁️';
            } else if (headerWithEmoji.includes('微風')) {
                headerWithEmoji += ' 🌬️';
            }

            return `
                <article class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden mb-8 hover:shadow-md transition-shadow">
                    <div class="bg-slate-50 border-b border-slate-100 px-6 py-4 flex items-center">
                        <svg class="w-5 h-5 text-blue-500 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                        </svg>
                        <h2 class="text-lg font-bold text-slate-800">${t(headerWithEmoji)}</h2>
                    </div>
                    <div class="p-6 sm:p-8 prose prose-slate max-w-none">
                        ${pTags}
                    </div>
                </article>
            `;
        }).join('');

        return `<div class="mx-auto max-w-3xl">${htmlCards}</div>`;
    }
</script>

</body>
</html>

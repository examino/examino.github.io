<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>諾民醫療中心 - 保健品展示</title>
  
  <!-- 引入 Tailwind CSS 進行樣式排版 -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 React 和 ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 引入 Babel 用於在瀏覽器中編譯 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    /* 隱藏滾動條的工具類 */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-gray-50">
  
  <!-- React 應用的掛載點 -->
  <div id="root"></div>

  <!-- React 邏輯代碼 -->
  <script type="text/babel">
    const { useState, useMemo } = React;

    // --- 圖標組件 (替換掉 lucide-react 的依賴，使其可以在單文件中獨立運行) ---
    const GlobeIcon = ({ size=24, className="" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></svg>
    );
    const ArrowLeftIcon = ({ size=24, className="" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    );
    const PillIcon = ({ size=24, className="" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"/><path d="m8.5 8.5 7 7"/></svg>
    );
    const BabyIcon = ({ size=24, className="" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9 12h.01"/><path d="M15 12h.01"/><path d="M10 16c.5.3 1.2.5 2 .5s1.5-.2 2-.5"/><path d="M19 6.3a9 9 0 0 1 1.8 3.9 2 2 0 0 1-1.9 2.2V14c0 1.1-.9 2-2 2h-1"/><path d="M15 16v3c0 1.1-.9 2-2 2h-2c-1.1 0-2-.9-2-2v-3"/><path d="M7 16H6c-1.1 0-2-.9-2-2v-1.6a2 2 0 0 1-1.9-2.2A9 9 0 0 1 15 2"/><path d="M15 2c-3.1 3-5 5.5-5 8"/><path d="M10 2c3.1 3 5 5.5 5 8"/></svg>
    );
    const LeafIcon = ({ size=24, className="" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 22l10-10"/></svg>
    );
    const ImageIconSvg = ({ size=24, className="" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
    );
    const SearchIcon = ({ size=24, className="" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    );

    // --- 多語言字典 ---
    const translations = {
      tc: {
        clinicName: '諾民醫療中心', subtitle: '專業保健品在線展示平台', langSwitch: '切換至簡體中文',
        home: '首頁', adult: '成人保健', child: '兒童保健', tcm: '中醫藥', all: '全部產品',
        viewDetails: '查看詳情', frontImage: '產品正面', ingredientImage: '成分說明',
        description: '產品描述', usage: '用法與注意事項', placeholderDesc: '這是產品的詳細描述。請在此處填寫產品的功效、適用人群等資訊。',
        placeholderUsage: '用法用量：每日X次，每次X粒。\n儲存方法：置於陰涼乾燥處。\n注意事項：孕婦及兒童請遵醫囑。',
        searchPlaceholder: '搜尋產品...', noProducts: '找不到相關產品',
      },
      sc: {
        clinicName: '诺民医疗中心', subtitle: '专业保健品在线展示平台', langSwitch: '切换至繁体中文',
        home: '首页', adult: '成人保健', child: '儿童保健', tcm: '中医药', all: '全部产品',
        viewDetails: '查看详情', frontImage: '产品正面', ingredientImage: '成分说明',
        description: '产品描述', usage: '用法与注意事项', placeholderDesc: '这是产品的详细描述。请在此处填写产品的功效、适用人群等信息。',
        placeholderUsage: '用法用量：每日X次，每次X粒。\n储存方法：置于阴凉干燥处。\n注意事项：孕妇及儿童请遵医嘱。',
        searchPlaceholder: '搜索产品...', noProducts: '找不到相关产品',
      }
    };

    // --- 數據生成函數 ---
    const generateProducts = () => {
      const products = [];
      // 1. 插入真實的中醫藥產品 (產品 1)
      products.push({
        id: 'tcm-1', category: 'tcm',
        name: { tc: '日本救心丹 (永昌禧字牌)', sc: '日本救心丹 (永昌禧字牌)' },
        images: { front: '中医药_产品1_正面.jpg', back: '中医药_产品1_成分.jpg' },
        shortDesc: { tc: '各種心臟的妙心丹，特選金粒，和漢煉成。加強配方。', sc: '各种心脏的妙心丹，特选金粒，和汉炼成。加强配方。' },
        description: { tc: '【主治功效】四肢無力、活血補氣、養心安神、順心通脈、精神疲乏。\n\n【主要成分】田七 11.25%、人參提取物(オタネニンジン抽出物) 7.5%、白柳提取物(西洋シロヤナギ抽出物) 7.5%、丹參葉末 11.25%、牛膽汁(うし胆汁) 6%、珍珠末(真珠末) 5.25%、肉桂(ケイヒ末) 2.25%、輔酶Q10(コエンザイムQ10) 1.875%、寒梅粉 5.25%、金箔 1%。', sc: '【主治功效】四肢无力、活血补气、养心安神、顺心通脉、精神疲乏。\n\n【主要成分】田七 11.25%、人参提取物 7.5%、白柳提取物 7.5%、丹参叶末 11.25%、牛胆汁 6%、珍珠末 5.25%、肉桂 2.25%、辅酶Q10 1.875%、寒梅粉 5.25%、金箔 1%。' },
        usage: { tc: '用法：成人每次一粒，每天二次，早晚飯後用溫水送服。\n儲存：置於陰涼乾爽處，避免兒童拿取。\n注意：孕婦忌服。\n規格：50粒裝。', sc: '用法：成人每次一粒，每天二次，早晚饭后用温水送服。\n储存：置于阴凉干爽处，避免儿童拿取。\n注意：孕妇忌服。\n规格：50粒装。' }
      });
      // 2. 生成其餘佔位符
      for (let i = 2; i <= 20; i++) { products.push({ id: `tcm-${i}`, category: 'tcm', name: { tc: `傳統中藥保健品 ${i}`, sc: `传统中药保健品 ${i}` }, images: { front: null, back: null }, shortDesc: { tc: '精選草本，傳統配方。', sc: '精选草本，传统配方。' } }); }
      for (let i = 1; i <= 20; i++) { products.push({ id: `adult-${i}`, category: 'adult', name: { tc: `成人綜合維他命/保健品 ${i}`, sc: `成人综合维生素/保健品 ${i}` }, images: { front: null, back: null }, shortDesc: { tc: '每日必備，補充成人所需營養。', sc: '每日必备，补充成人所需营养。' } }); }
      for (let i = 1; i <= 20; i++) { products.push({ id: `child-${i}`, category: 'child', name: { tc: `兒童成長營養素 ${i}`, sc: `儿童成长营养素 ${i}` }, images: { front: null, back: null }, shortDesc: { tc: '幫助兒童健康發育，增強免疫力。', sc: '帮助儿童健康发育，增强免疫力。' } }); }
      return products;
    };

    const allProducts = generateProducts();

    function App() {
      const [lang, setLang] = useState('tc');
      const [activeCategory, setActiveCategory] = useState('all');
      const [selectedProduct, setSelectedProduct] = useState(null);
      const [searchTerm, setSearchTerm] = useState('');

      const t = (key) => translations[lang][key];
      const toggleLang = () => setLang(lang === 'tc' ? 'sc' : 'tc');

      const categories = [
        { id: 'all', name: t('all'), icon: null },
        { id: 'adult', name: t('adult'), icon: <PillIcon size={18} className="mr-2" /> },
        { id: 'child', name: t('child'), icon: <BabyIcon size={18} className="mr-2" /> },
        { id: 'tcm', name: t('tcm'), icon: <LeafIcon size={18} className="mr-2" /> },
      ];

      const filteredProducts = useMemo(() => {
        return allProducts.filter(p => {
          const matchCategory = activeCategory === 'all' || p.category === activeCategory;
          const matchSearch = p.name[lang].toLowerCase().includes(searchTerm.toLowerCase());
          return matchCategory && matchSearch;
        });
      }, [activeCategory, searchTerm, lang]);

      const ProductCard = ({ product }) => (
        <div 
          className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition-shadow cursor-pointer flex flex-col h-full group"
          onClick={() => setSelectedProduct(product)}
        >
          <div className="aspect-square bg-gray-50 flex items-center justify-center p-4 relative overflow-hidden">
            {product.images.front ? (
              <img 
                src={product.images.front} 
                alt={product.name[lang]} 
                className="object-contain w-full h-full group-hover:scale-105 transition-transform duration-300"
                onError={(e) => { e.target.onerror = null; e.target.src = 'https://placehold.co/400x400/e2e8f0/64748b?text=Image+Not+Found'; }}
              />
            ) : (
              <div className="text-gray-400 flex flex-col items-center">
                <ImageIconSvg size={48} className="mb-2 opacity-50" />
                <span className="text-sm">圖片準備中</span>
              </div>
            )}
            <div className="absolute top-2 right-2 bg-blue-50 text-blue-600 text-xs px-2 py-1 rounded-full font-medium">
              {categories.find(c => c.id === product.category)?.name}
            </div>
          </div>
          <div className="p-5 flex flex-col flex-grow">
            <h3 className="text-lg font-bold text-gray-800 mb-2 line-clamp-2">{product.name[lang]}</h3>
            <p className="text-gray-500 text-sm mb-4 line-clamp-2 flex-grow">{product.shortDesc[lang]}</p>
            <button className="w-full py-2 bg-blue-50 hover:bg-blue-600 hover:text-white text-blue-600 font-medium rounded-lg transition-colors text-sm">
              {t('viewDetails')}
            </button>
          </div>
        </div>
      );

      const ProductDetail = ({ product }) => {
        const [activeImage, setActiveImage] = useState('front');
        const desc = product.description?.[lang] || t('placeholderDesc');
        const usage = product.usage?.[lang] || t('placeholderUsage');

        return (
          <div className="animate-in fade-in slide-in-from-bottom-4 duration-300 max-w-5xl mx-auto">
            <button onClick={() => setSelectedProduct(null)} className="flex items-center text-blue-600 hover:text-blue-800 mb-6 font-medium transition-colors">
              <ArrowLeftIcon size={20} className="mr-2" /> 返回產品列表
            </button>

            <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
              <div className="grid grid-cols-1 md:grid-cols-2 gap-0">
                <div className="p-8 bg-gray-50 border-b md:border-b-0 md:border-r border-gray-100">
                  <div className="aspect-[4/5] bg-white rounded-xl shadow-sm border border-gray-100 flex items-center justify-center p-4 mb-4 overflow-hidden">
                    {product.images[activeImage] ? (
                       <img 
                         src={product.images[activeImage]} 
                         alt={`${product.name[lang]} - ${activeImage === 'front' ? '正面' : '成分'}`}
                         className="object-contain w-full h-full"
                         onError={(e) => { e.target.onerror = null; e.target.src = 'https://placehold.co/600x800/e2e8f0/64748b?text=Image+Not+Found'; }}
                       />
                    ) : (
                      <div className="text-gray-400 flex flex-col items-center">
                        <ImageIconSvg size={64} className="mb-4 opacity-30" />
                        <span className="text-gray-500 font-medium">{activeImage === 'front' ? t('frontImage') : t('ingredientImage')} 暫缺</span>
                      </div>
                    )}
                  </div>
                  <div className="grid grid-cols-2 gap-4">
                    <button onClick={() => setActiveImage('front')} className={`py-2 px-4 rounded-lg font-medium text-sm transition-all ${activeImage === 'front' ? 'bg-blue-600 text-white shadow-md' : 'bg-white text-gray-600 border border-gray-200 hover:bg-gray-50'}`}>{t('frontImage')}</button>
                    <button onClick={() => setActiveImage('back')} className={`py-2 px-4 rounded-lg font-medium text-sm transition-all ${activeImage === 'back' ? 'bg-blue-600 text-white shadow-md' : 'bg-white text-gray-600 border border-gray-200 hover:bg-gray-50'}`}>{t('ingredientImage')}</button>
                  </div>
                </div>

                <div className="p-8 md:p-10 flex flex-col">
                  <div className="inline-block px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-xs font-bold tracking-wider mb-4 w-max">
                    {categories.find(c => c.id === product.category)?.name}
                  </div>
                  <h1 className="text-2xl md:text-3xl font-bold text-gray-900 mb-6">{product.name[lang]}</h1>
                  <div className="space-y-8 flex-grow">
                    <div>
                      <h3 className="text-lg font-bold text-gray-800 border-b-2 border-blue-100 pb-2 mb-3 inline-block">{t('description')}</h3>
                      <p className="text-gray-600 leading-relaxed whitespace-pre-line text-sm md:text-base">{desc}</p>
                    </div>
                    <div>
                      <h3 className="text-lg font-bold text-gray-800 border-b-2 border-blue-100 pb-2 mb-3 inline-block">{t('usage')}</h3>
                      <div className="bg-yellow-50 rounded-xl p-5 border border-yellow-100">
                        <p className="text-gray-700 leading-relaxed whitespace-pre-line text-sm md:text-base font-medium">{usage}</p>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen font-sans text-gray-900 selection:bg-blue-200">
          <header className="bg-white border-b border-gray-200 sticky top-0 z-10 shadow-sm">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex justify-between items-center h-20">
                <div className="flex flex-col cursor-pointer" onClick={() => { setSelectedProduct(null); setActiveCategory('all'); }}>
                  <h1 className="text-2xl font-black text-blue-700 tracking-tight">{t('clinicName')}</h1>
                  <span className="text-xs font-medium text-gray-500 uppercase tracking-widest mt-0.5">{t('subtitle')}</span>
                </div>
                <button onClick={toggleLang} className="flex items-center space-x-2 text-sm font-medium text-gray-600 hover:text-blue-600 bg-gray-100 hover:bg-blue-50 px-4 py-2 rounded-full transition-colors">
                  <GlobeIcon size={16} />
                  <span>{t('langSwitch')}</span>
                </button>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 md:py-12">
            {selectedProduct ? (
              <ProductDetail product={selectedProduct} />
            ) : (
              <div className="space-y-8">
                <div className="flex flex-col md:flex-row justify-between items-center gap-4 bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                  <div className="flex overflow-x-auto hide-scrollbar w-full md:w-auto gap-2 pb-2 md:pb-0">
                    {categories.map((cat) => (
                      <button key={cat.id} onClick={() => setActiveCategory(cat.id)} className={`whitespace-nowrap flex items-center px-5 py-2.5 rounded-xl font-medium text-sm transition-all ${activeCategory === cat.id ? 'bg-blue-600 text-white shadow-md' : 'bg-gray-50 text-gray-600 hover:bg-gray-100'}`}>
                        {cat.icon}
                        {cat.name}
                      </button>
                    ))}
                  </div>
                  <div className="relative w-full md:w-72">
                    <div className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
                      <SearchIcon size={18} />
                    </div>
                    <input type="text" placeholder={t('searchPlaceholder')} value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="w-full pl-10 pr-4 py-2.5 bg-gray-50 border border-transparent focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-200 rounded-xl outline-none transition-all text-sm" />
                  </div>
                </div>

                {filteredProducts.length > 0 ? (
                  <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                    {filteredProducts.map(product => <ProductCard key={product.id} product={product} />)}
                  </div>
                ) : (
                  <div className="text-center py-20 bg-white rounded-2xl border border-gray-100">
                    <div className="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gray-100 mb-4">
                      <SearchIcon size={24} className="text-gray-400" />
                    </div>
                    <h3 className="text-lg font-medium text-gray-900">{t('noProducts')}</h3>
                  </div>
                )}
              </div>
            )}
          </main>
          
          <footer className="bg-white border-t border-gray-200 mt-12 py-8 text-center text-gray-500 text-sm">
            <p>© {new Date().getFullYear()} {t('clinicName')}. All rights reserved.</p>
          </footer>
        </div>
      );
    }

    // 渲染應用
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>諾民醫療中心 Nuomin Medical Center</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        medical: {
                            50: '#f0fdfa',
                            100: '#ccfbf1',
                            500: '#14b8a6',
                            600: '#0d9488',
                            700: '#0f766e',
                            900: '#134e4a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f8fafc; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // 字典定義
        const dict = {
            tc: {
                clinicName: "諾民醫療中心",
                subTitle: "精選保健產品展示",
                switchLang: "简",
                switchLangFull: "切換至簡體",
                home: "返回首頁",
                viewDetails: "查看詳情",
                productFront: "產品正面",
                productBack: "成分說明",
                detailsTitle: "產品詳細資訊",
                features: "主要功效",
                ingredients: "主要成分",
                usage: "用法用量",
                storage: "儲存方式",
                caution: "注意事項",
                spec: "產品規格",
                placeholder: "產品圖片",
                emptyTitle: "其他保健產品",
                emptyDesc: "產品詳細資料建置中，敬請期待。",
                noData: "暫無資料"
            },
            sc: {
                clinicName: "诺民医疗中心",
                subTitle: "精选保健产品展示",
                switchLang: "繁",
                switchLangFull: "切换至繁体",
                home: "返回首页",
                viewDetails: "查看详情",
                productFront: "产品正面",
                productBack: "成分说明",
                detailsTitle: "产品详细资讯",
                features: "主要功效",
                ingredients: "主要成分",
                usage: "用法用量",
                storage: "储存方式",
                caution: "注意事项",
                spec: "产品规格",
                placeholder: "产品图片",
                emptyTitle: "其他保健产品",
                emptyDesc: "产品详细资料建置中，敬请期待。",
                noData: "暂无资料"
            }
        };

        // 產生 30 個產品資料的 Hook
        const useProducts = (lang) => {
            return useMemo(() => {
                const t = dict[lang];
                const isTC = lang === 'tc';
                const products = [];

                // 產品 1 (真實資料)
                products.push({
                    id: 1,
                    name: isTC ? "日本救心丹 (永昌囍字牌)" : "日本救心丹 (永昌囍字牌)",
                    shortDesc: isTC ? "加強配方，特選金粒，和漢煉成。主理四肢無力、活血補氣。" : "加强配方，特选金粒，和汉炼成。主理四肢无力、活血补气。",
                    imageFront: "产品1_正面.jpg",
                    imageBack: "产品1_成分.jpg",
                    details: {
                        features: isTC ? "四肢無力、活血補氣、養心安神、順心通脈、精神疲乏" : "四肢无力、活血补气、养心安神、顺心通脉、精神疲乏",
                        ingredients: isTC ? "田七 11.25%、人參提取物(オタネニンジン抽出物) 7.5%、白柳提取物(西洋シロヤナギ抽出物) 7.5%、丹參葉末 11.25%、牛膽汁(うし胆汁) 6%、珍珠末(真珠末) 5.25%、肉桂(ケイヒ末) 2.25%、輔酶Q10(コエンザイムQ10) 1.875%、寒梅粉 5.25%、金箔 1%。" : "田七 11.25%、人参提取物(オタネニンジン抽出物) 7.5%、白柳提取物(西洋シロヤナギ抽出物) 7.5%、丹参叶末 11.25%、牛胆汁(うし胆汁) 6%、珍珠末(真珠末) 5.25%、肉桂(ケイヒ末) 2.25%、辅酶Q10(コエンザイムQ10) 1.875%、寒梅粉 5.25%、金箔 1%。",
                        usage: isTC ? "成人每次一粒，每天二次，早晚飯後用溫水送服。" : "成人每次一粒，每天二次，早晚饭后用温水送服。",
                        storage: isTC ? "置於陰涼乾爽處，避免兒童拿取。" : "置于阴凉干爽处，避免儿童拿取。",
                        caution: isTC ? "孕婦忌服。" : "孕妇忌服。",
                        spec: isTC ? "50粒裝。" : "50粒装。"
                    }
                });

                // 產品 2-30 (佔位符)
                for (let i = 2; i <= 30; i++) {
                    products.push({
                        id: i,
                        name: `${isTC ? '保健產品' : '保健产品'} ${i}`,
                        shortDesc: t.emptyDesc,
                        imageFront: null,
                        imageBack: null,
                        details: {
                            features: t.noData,
                            ingredients: t.noData,
                            usage: t.noData,
                            storage: t.noData,
                            caution: t.noData,
                            spec: t.noData
                        }
                    });
                }
                return products;
            }, [lang]);
        };

        // Icon 元件 (模擬 Lucide)
        const HeartPulseIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/><path d="M3.22 12H9.5l.5-1 2 4.5 2-7 1.5 3.5h5.27"/></svg>;
        const ArrowLeftIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>;
        const PillIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"/><path d="m8.5 8.5 7 7"/></svg>;
        const ImagePlaceholderIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round" className="text-slate-300"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>;

        const App = () => {
            const [lang, setLang] = useState('tc');
            const [selectedProductId, setSelectedProductId] = useState(null);
            const products = useProducts(lang);
            const t = dict[lang];

            const toggleLang = () => {
                setLang(prev => prev === 'tc' ? 'sc' : 'tc');
            };

            const selectedProduct = products.find(p => p.id === selectedProductId);

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header */}
                    <header className="bg-medical-700 text-white shadow-md sticky top-0 z-10">
                        <div className="container mx-auto px-4 py-4 flex justify-between items-center">
                            <div className="flex items-center space-x-3 cursor-pointer" onClick={() => setSelectedProductId(null)}>
                                <div className="bg-white text-medical-700 p-2 rounded-full">
                                    <HeartPulseIcon />
                                </div>
                                <div>
                                    <h1 className="text-xl md:text-2xl font-bold tracking-wide">{t.clinicName}</h1>
                                </div>
                            </div>
                            <button 
                                onClick={toggleLang}
                                className="px-3 py-1.5 bg-medical-600 hover:bg-medical-500 rounded-md border border-medical-500 transition-colors flex items-center space-x-1"
                                title={t.switchLangFull}
                            >
                                <span className="font-medium">{t.switchLang}</span>
                            </button>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="flex-grow container mx-auto px-4 py-8">
                        {!selectedProductId ? (
                            // Home / Grid View
                            <div className="fade-in">
                                <div className="mb-8 text-center">
                                    <h2 className="text-3xl font-bold text-slate-800 mb-2">{t.subTitle}</h2>
                                    <p className="text-slate-500">共 30 款產品</p>
                                </div>
                                <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 md:gap-6">
                                    {products.map(product => (
                                        <div 
                                            key={product.id} 
                                            onClick={() => setSelectedProductId(product.id)}
                                            className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden cursor-pointer hover:shadow-lg hover:border-medical-500 transition-all duration-300 group flex flex-col h-full"
                                        >
                                            <div className="aspect-square bg-slate-100 flex items-center justify-center relative overflow-hidden">
                                                {product.imageFront ? (
                                                    <img 
                                                        src={product.imageFront} 
                                                        alt={product.name} 
                                                        className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"
                                                        onError={(e) => { e.target.onerror = null; e.target.style.display = 'none'; e.target.nextSibling.style.display = 'flex'; }}
                                                    />
                                                ) : null}
                                                {/* Fallback placeholder if image fails to load or doesn't exist */}
                                                <div className={`w-full h-full flex-col items-center justify-center ${product.imageFront ? 'hidden' : 'flex'}`}>
                                                    <ImagePlaceholderIcon />
                                                    <span className="text-slate-400 text-sm mt-2">{t.placeholder}</span>
                                                </div>
                                                
                                                {/* Badge for real products */}
                                                {product.id === 1 && (
                                                    <div className="absolute top-2 right-2 bg-red-600 text-white text-xs font-bold px-2 py-1 rounded shadow">
                                                        {lang === 'tc' ? '熱銷' : '热销'}
                                                    </div>
                                                )}
                                            </div>
                                            <div className="p-4 flex flex-col flex-grow">
                                                <h3 className="font-bold text-slate-800 text-base md:text-lg mb-1 line-clamp-2">{product.name}</h3>
                                                <p className="text-sm text-slate-500 line-clamp-2 mb-4 flex-grow">{product.shortDesc}</p>
                                                <div className="mt-auto text-medical-600 text-sm font-medium flex items-center group-hover:text-medical-700">
                                                    {t.viewDetails}
                                                    <svg className="w-4 h-4 ml-1 transform group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5l7 7-7 7"></path></svg>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            // Detail View
                            <div className="fade-in max-w-5xl mx-auto">
                                <button 
                                    onClick={() => setSelectedProductId(null)}
                                    className="mb-6 flex items-center text-medical-700 hover:text-medical-900 font-medium transition-colors"
                                >
                                    <ArrowLeftIcon />
                                    <span className="ml-2">{t.home}</span>
                                </button>

                                <div className="bg-white rounded-2xl shadow-md border border-slate-200 overflow-hidden">
                                    {/* Product Title Header */}
                                    <div className="bg-slate-50 border-b border-slate-200 p-6 md:p-8 flex items-center space-x-4">
                                        <div className="p-3 bg-medical-100 text-medical-600 rounded-lg">
                                            <PillIcon />
                                        </div>
                                        <h2 className="text-2xl md:text-4xl font-bold text-slate-800">{selectedProduct.name}</h2>
                                    </div>

                                    <div className="p-6 md:p-8 flex flex-col lg:flex-row gap-8 lg:gap-12">
                                        {/* Images Section */}
                                        <div className="w-full lg:w-5/12 space-y-6">
                                            {/* Front Image */}
                                            <div className="space-y-2">
                                                <h4 className="text-sm font-semibold text-slate-500 uppercase tracking-wider">{t.productFront}</h4>
                                                <div className="bg-slate-100 rounded-xl overflow-hidden border border-slate-200 aspect-[3/4] flex items-center justify-center">
                                                    {selectedProduct.imageFront ? (
                                                         <img src={selectedProduct.imageFront} alt={`${selectedProduct.name} 正面`} className="w-full h-full object-contain" />
                                                    ) : (
                                                        <div className="flex flex-col items-center justify-center text-slate-400">
                                                            <ImagePlaceholderIcon />
                                                            <span className="mt-2">{t.placeholder}</span>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>

                                            {/* Back/Ingredients Image */}
                                            <div className="space-y-2">
                                                <h4 className="text-sm font-semibold text-slate-500 uppercase tracking-wider">{t.productBack}</h4>
                                                <div className="bg-slate-100 rounded-xl overflow-hidden border border-slate-200 aspect-[3/4] flex items-center justify-center">
                                                    {selectedProduct.imageBack ? (
                                                         <img src={selectedProduct.imageBack} alt={`${selectedProduct.name} 成分`} className="w-full h-full object-contain" />
                                                    ) : (
                                                        <div className="flex flex-col items-center justify-center text-slate-400">
                                                            <ImagePlaceholderIcon />
                                                            <span className="mt-2">{t.placeholder}</span>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        </div>

                                        {/* Details Section */}
                                        <div className="w-full lg:w-7/12">
                                            <h3 className="text-xl font-bold text-medical-800 mb-6 pb-2 border-b-2 border-medical-100 inline-block">
                                                {t.detailsTitle}
                                            </h3>
                                            
                                            <div className="space-y-6">
                                                <div className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                                    <h4 className="font-bold text-slate-800 flex items-center mb-2">
                                                        <span className="w-1.5 h-1.5 bg-medical-500 rounded-full mr-2"></span>
                                                        {t.features}
                                                    </h4>
                                                    <p className="text-slate-600 leading-relaxed pl-3.5">
                                                        {selectedProduct.details.features}
                                                    </p>
                                                </div>

                                                <div className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                                    <h4 className="font-bold text-slate-800 flex items-center mb-2">
                                                        <span className="w-1.5 h-1.5 bg-medical-500 rounded-full mr-2"></span>
                                                        {t.ingredients}
                                                    </h4>
                                                    <p className="text-slate-600 leading-relaxed pl-3.5">
                                                        {selectedProduct.details.ingredients}
                                                    </p>
                                                </div>

                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                    <div className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                                        <h4 className="font-bold text-slate-800 flex items-center mb-2">
                                                            <span className="w-1.5 h-1.5 bg-medical-500 rounded-full mr-2"></span>
                                                            {t.usage}
                                                        </h4>
                                                        <p className="text-slate-600 leading-relaxed pl-3.5">
                                                            {selectedProduct.details.usage}
                                                        </p>
                                                    </div>

                                                    <div className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                                        <h4 className="font-bold text-slate-800 flex items-center mb-2">
                                                            <span className="w-1.5 h-1.5 bg-medical-500 rounded-full mr-2"></span>
                                                            {t.spec}
                                                        </h4>
                                                        <p className="text-slate-600 leading-relaxed pl-3.5">
                                                            {selectedProduct.details.spec}
                                                        </p>
                                                    </div>
                                                </div>

                                                <div className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                                    <h4 className="font-bold text-slate-800 flex items-center mb-2">
                                                        <span className="w-1.5 h-1.5 bg-medical-500 rounded-full mr-2"></span>
                                                        {t.storage}
                                                    </h4>
                                                    <p className="text-slate-600 leading-relaxed pl-3.5">
                                                        {selectedProduct.details.storage}
                                                    </p>
                                                </div>

                                                <div className="bg-red-50 p-4 rounded-xl border border-red-100">
                                                    <h4 className="font-bold text-red-800 flex items-center mb-2">
                                                        <span className="w-1.5 h-1.5 bg-red-500 rounded-full mr-2"></span>
                                                        {t.caution}
                                                    </h4>
                                                    <p className="text-red-700 leading-relaxed pl-3.5 font-medium">
                                                        {selectedProduct.details.caution}
                                                    </p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Footer */}
                    <footer className="bg-slate-800 text-slate-400 py-6 mt-auto">
                        <div className="container mx-auto px-4 text-center">
                            <p>© {new Date().getFullYear()} {t.clinicName}. All rights reserved.</p>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
